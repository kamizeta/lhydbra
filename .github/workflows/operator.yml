name: Operator Mode - Autonomous Trading Loop

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-operator:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Operator Mode
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            'https://boccgfolfxhkcxflkrqz.supabase.co/functions/v1/operator-mode' \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -d '{"scheduled": true}'
