
<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="2000" viewBox="0 0 1000 1000">
  <rect width="100%" height="100%" fill="#020816"/>
  
  <!-- Infinity style loop -->
  <path d="
    M 250 520
    C 250 380 430 380 500 520
    C 570 660 750 660 750 520
    C 750 380 570 380 500 520
    C 430 660 250 660 250 520
  "
  fill="none"
  stroke="#1f7a3a"
  stroke-width="80"
  stroke-linecap="round"
  stroke-linejoin="round"/>
  
  <!-- d vertical stem -->
  <rect x="440" y="240" width="60" height="320" rx="30" fill="#1f7a3a"/>
  
  <!-- b vertical stem -->
  <rect x="500" y="240" width="60" height="320" rx="30" fill="#1f7a3a"/>
</svg>
